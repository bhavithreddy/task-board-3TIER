# ================================================================
# NGINX Configuration — TaskFlow Frontend
#
# BUG FIXED: Template now uses ${BACKEND_HOST} with dollar sign
# and curly braces so envsubst actually substitutes the value.
# Previously used plain BACKEND_HOST which envsubst IGNORED,
# causing NGINX to proxy to literal "http://BACKEND_HOST" → 502.
# ================================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json;
    gzip_min_length 1024;

    # ── React Router support ──────────────────────────────────
    # For any path that doesn't match a real file, serve index.html
    # This allows React Router paths like /tasks/123 to work on refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ─────────────────────────────────────────────
    # FIX: Use ${BACKEND_HOST} — envsubst replaces this at startup
    # BACKEND_HOST is injected via Docker/K8s environment variable
    # e.g. BACKEND_HOST=backend:5000  (K8s service name + port)
    #
    # Request path:  /api/tasks
    # Proxied to:    http://backend:5000/api/tasks
    location /api/ {
        proxy_pass http://${BACKEND_HOST}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # CORS headers — allow browser requests from any origin
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ── Static asset caching ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Health check endpoint ─────────────────────────────────
    # Used by Kubernetes liveness/readiness probes
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
