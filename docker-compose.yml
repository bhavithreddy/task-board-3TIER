# ================================================================
# Docker Compose — Full 3-Tier Stack (Local Testing)
#
# Usage:
#   docker compose up --build        # First time
#   docker compose up                 # Subsequent runs
#   docker compose down               # Stop everything
#   docker compose down -v            # Stop + delete data
#
# Access:
#   Frontend:  http://localhost:3000
#   Backend:   http://localhost:5000
#   API test:  curl http://localhost:5000/health
#
# No MongoDB installation required — it runs in Docker.
# ================================================================

version: "3.8"

services:
  # ── MongoDB ─────────────────────────────────────────────────
  # Official MongoDB 7 image — no auth for local dev simplicity
  mongodb:
    image: mongo:7.0
    container_name: taskflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"           # Expose so you can connect with Compass
    volumes:
      - mongodb_data:/data/db   # Persist data between restarts
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend (Node.js + Express) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"             # Expose for direct API testing
    environment:
      # MONGO_URI points to the mongodb service using Docker DNS
      # Docker Compose creates a network where service name = hostname
      - MONGO_URI=mongodb://mongodb:27017/taskflow
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      mongodb:
        condition: service_healthy   # Wait for MongoDB to be ready
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Frontend (React + NGINX) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"               # Access app at http://localhost:3000
    environment:
      # BACKEND_HOST is injected into nginx.conf by envsubst at startup.
      # "backend" = Docker service name (DNS resolves automatically)
      # "5000"    = backend container port
      - BACKEND_HOST=backend:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskflow-net

# ── Volumes ──────────────────────────────────────────────────
volumes:
  mongodb_data:
    name: taskflow_mongodb_data

# ── Networks ─────────────────────────────────────────────────
networks:
  taskflow-net:
    name: taskflow_network
    driver: bridge
