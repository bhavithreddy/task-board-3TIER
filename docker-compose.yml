version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: taskflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://taskflow-mongodb:27017/taskflow
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - taskflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskflow-net

volumes:
  mongodb_data:
    name: taskflow_mongodb_data

networks:
  taskflow-net:
    name: taskflow_network
    driver: bridge
