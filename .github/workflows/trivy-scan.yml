name: Trivy Security Scan

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Filesystem Scan
      # =========================
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem

      # =========================
      # Build Docker Images
      # =========================
      - name: Build backend image
        run: docker build -t task-board-3tier-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t task-board-3tier-frontend:latest ./frontend

      # =========================
      # Backend Image Scan
      # =========================
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: task-board-3tier-backend:latest
          format: sarif
          output: trivy-backend.sarif

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-image

      # =========================
      # Frontend Image Scan
      # =========================
      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: task-board-3tier-frontend:latest
          format: sarif
          output: trivy-frontend.sarif

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-image
